jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Variable Gathering
        id: gathervars
        run: |
          # get a current BUILD_DATE
          echo "BUILD_DATE=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
          # set version based on BUILD_DATE
          echo "VERSION=$(date +%Y.%m.%d)-development" >> $GITHUB_ENV
          
          # 【新增】将仓库名转换为小写，以符合 Docker Tag 规范
          # GITHUB_REPOSITORY 是系统自带的环境变量，格式为 "Owner/Repo"
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v4
        with:
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            VERSION=${{ env.VERSION }}
          context: ./docker/development
          tags: |
            # 【修改】使用小写的 env.REPO_LOWER 变量
            ghcr.io/${{ env.REPO_LOWER }}-dev:latest
            ghcr.io/${{ env.REPO_LOWER }}-dev:${{ env.VERSION }}
          push: true
