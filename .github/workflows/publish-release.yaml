name: Publish Release

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Variable Gathering
        id: gathervars
        run: |
          NOT_PREVIOUSLY_PUBLISHED=0
          
          # 【关键修复】在 Shell 中将仓库名转为小写
          # GITHUB_REPOSITORY 是环境变量，例如 M1saka10010/headscale-ui
          # 这里将其转换为 m1saka10010/headscale-ui
          REPO_LOWER="${GITHUB_REPOSITORY,,}"
          echo "REPO_LOWER=$REPO_LOWER" >> $GITHUB_ENV

          VERSION=$(jq -r '.version' ./package.json)
          echo "BUILD_DATE=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # setting tags (使用小写的变量 REPO_LOWER)
          if echo "$VERSION" | grep -q "beta"; then
            echo "TAGS=ghcr.io/${REPO_LOWER}:beta,ghcr.io/${REPO_LOWER}:$VERSION,ghcr.io/${REPO_LOWER}:latest" >> $GITHUB_ENV
          else
            echo "TAGS=ghcr.io/${REPO_LOWER}:release,ghcr.io/${REPO_LOWER}:latest,ghcr.io/${REPO_LOWER}:$VERSION" >> $GITHUB_ENV
          fi
          echo "PRIMARY_TAG=latest" >> $GITHUB_ENV
          
          # check if version has already been published (检查时也使用小写变量)
          $(docker manifest inspect ghcr.io/${REPO_LOWER}:$VERSION > /dev/null) || NOT_PREVIOUSLY_PUBLISHED=1
          echo "NOT_PREVIOUSLY_PUBLISHED=$NOT_PREVIOUSLY_PUBLISHED" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        if: ${{ env.NOT_PREVIOUSLY_PUBLISHED != 0 }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v6
        if: ${{ env.NOT_PREVIOUSLY_PUBLISHED != 0 }}
        with:
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            VERSION=${{ env.VERSION }}
          context: ./docker/production
          tags: |
            ${{ env.TAGS }}
          platforms: linux/amd64,linux/arm/v7,linux/arm64/v8
          push: true

      - name: Extract build out of docker image
        uses: shrink/actions-docker-extract@v3
        if: ${{ env.NOT_PREVIOUSLY_PUBLISHED != 0 }}
        id: extract
        with:
          # 【关键修复】这里也要使用小写的环境变量
          image: ghcr.io/${{ env.REPO_LOWER }}:${{ env.PRIMARY_TAG }}
          path: web
          
      - name: create release asset
        if: ${{ env.NOT_PREVIOUSLY_PUBLISHED != 0 }}
        run: |
          cd "${{ steps.extract.outputs.destination }}"
          7z a headscale-ui.zip web

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: ${{ env.NOT_PREVIOUSLY_PUBLISHED != 0 }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION }}
          name: headscale-ui
          files: ${{ steps.extract.outputs.destination }}/headscale-ui.zip
          generate_release_notes: true
          make_latest: true
